---
layout: default
---

<section class="weather">
	<div class="weather-container">
		<div class="weather-image">
			<img class="weather-image__main" src="../projects/weather/weather.png" alt="Images">
		</div>
		<div class="weather-text">
			<h1 class="weather-text__main">City Weather App</h1>
			<p class="weather-text__subs">A mobile application displaying weather information of your current city.</p>
		</div>
	</div>
</section>
<section class="weather-info">
	<div class="weather-info-container">
		<div class="weather-info__right">
			<h1 class="weather-info__main">Role:</h1>
			<p class="weather-info__subs">Mobile Developer</p>
		</div>
		<div class="weather-info__left">
			<h1 class="weather-info__main">Platform:</h1>
			<p class="weather-info__subs">Android, iOS</p>
		</div>
		<div class="weather-info__right">
			<h1 class="weather-info__main">Tools:</h1>
			<p class="weather-info__subs">Flutter, Dart</p>
		</div>
	</div>
</section>
<section class="weather-gallery">
	<h1 class="weather-gallery__main">Gallery</h1>
	<div class="weather-gallery-container">
		<div class="weather-gallery">
			<img class="weather-gallery__main" src="../projects/weather/weather-daily.png" alt="Images">
		</div>
		<div class="weather-gallery-image">
			<img class="weather-gallery__main" src="../projects/weather/weather-home-2.png" alt="Images">
		</div>
		<div class="weather-gallery">
			<img class="weather-gallery__main" src="../projects/weather/weather-hourly.png" alt="Images">
		</div>
		<div class="weather-gallery-image">
			<img class="weather-gallery__main" src="../projects/weather/weather-daily-2.png" alt="Images">
		</div>
	</div>
</section>
